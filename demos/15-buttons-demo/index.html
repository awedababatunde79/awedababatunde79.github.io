        <title>Buttons Demo</title>

    </head>
    <body>
        <div id="section-1">
            <a href="#" class="button simple">Learn More</a>

        <div id="section-2">
            <a href="#" class="button background">Learn More</a>
            <a href="#" class="button background">Subscribe Now!</a>

        <div id="section-3">
            <a href="#" class="button simple wide">Learn More</a>

        </div>

</html>
