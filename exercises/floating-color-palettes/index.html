<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Floating-Color-Palettes</title>
        <link href="css/style.css" rel="stylesheet">
    </head>
    <body>
        <div class="color-palette">
            <h2>Sunset Glow</h2>
            <h4 class="color" id="color-1">#FF6B6B</h4>
            <h4 class="color" id="color-2">#FFD93D</h4>
            <h4 class="color" id="color-3">#FF9F1C</h4>
            <h4 class="color" id="color-4">#FAC9B8</h4>
        </div>

        <div class="color-palette">
            <h2>Ocean Breeze</h2>
            <h4 class="color" id="color-5">#274690</h4>
            <h4 class="color" id="color-6">#4472CA</h4>
            <h4 class="color" id="color-7">#5E7CE2</h4>
            <h4 class="color" id="color-8">#7189FF</h4>
        </div>

        <div class="color-palette">
            <h2>Forest Calm</h2>
            <h4 class="color" id="color-9">#5CAB7D</h4>
            <h4 class="color" id="color-10">#6A8D73</h4>
            <h4 class="color" id="color-11">#7CB518</h4>
            <h4 class="color" id="color-12">#5C8001 </h4>
        </div>
    </body>
</html>
