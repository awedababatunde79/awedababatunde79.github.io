<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Bulletin Board (Exercise)</title>
        <link href="css/setup.css" rel="stylesheet">
        <link href="css/style.css" rel="stylesheet" data-meal-prep>
    </head>
    <body>
        <div id="bulletin-board">
            <div class="row">
                <div class="post-it yellow">
                    <h3>NOTE TO SELF</h3>
                    <p>Don't forget to pick up the computer after work!</p>
                </div>

                <div class="post-it pink center-note">
                    <h2>JUST<br>BREATHE</h2>
                </div>

                <div class="post-it blue center-note">
                    <h3>CALL MOM THIS WEEKEND</h3>
                </div>
            </div>
            <div class="row">
                <div class="post-it green">
                    <h3>GROCERY LIST</h3>
                    <ul>
                        <li>Egg</li>
                        <li>Butter</li>
                        <li>Banana</li>
                        <li>Milk</li>
                        <li>Bread</li>
                    </ul>
                </div>

                <div class="post-it photo">
                    <img src="images/cute-dog-1.jpg" alt="Sample picture">
                </div>

                <div class="post-it yellow quote">
                    <p>
                        "In three words I can sum up everything,
                        I've learned about life:
                    </p> 
                    <p>it goes on."</p>
                </div>
            </div>
        </div>
    </body>
</html>
